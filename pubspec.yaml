name: skincare_stack
description: "Skincare App Project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.4.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  camera: ^0.11.0
  gal: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  awesome_notifications: ^0.10.1
  tflite_flutter: 0.10.1
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
